<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Dynamic Array</title>
    </head>
    <body>
        <div id="S1"></div>
    </body>
</html>
<script>

    var student=[{id:1,name:"sai",salary:100000},
                 {id:2,name:"sayali",salary:200000},
                 {id:3,name:"siddhi",salary:300000},
                 {id:4,name:"apurva",salary:400000}];
    
    var str="";
    
    str+="<table border='1'>";
    str+="<tr>";
    str+="<th>id</th>";
    str+="<th>name</th>";
    str+="<th>salary</th>";
    str+="</tr>";

    for(i=0;i<student.length;i++)
    {
     str+="<tr>";
        str+="<td>"+student[i].id+"</td>";
         str+="<td>"+student[i].name+"</td>";
          str+="<td>"+student[i].salary+"</td>";
          
       str+="<tr>";    
    }
    str+="</table>";
    document.getElementById("S1").innerHTML=str;


</script>
