<!DOCTYPE html>
<html lang="en">
<head>
    <title>PR4CSS1</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width" initial-scale="0.1">
<style>
.box
{
    height:200px;
    width:200px;
}
.it1
{
    border:2px solid blue;
    background-color: red;
}
.it2
{
    border:2px solid rgb(38, 193, 144);
    background-color: rgb(212, 255, 18);

}
</style>
</head>
<body>
 <div class="box it1">box it1</div>
 <div class="box it2">box it2</div>
</body>
</html>

here dimensions of these two divs is given same using the class box but colour and border is different using it1 and it2, so by using combination we can specify different styling using class combination
