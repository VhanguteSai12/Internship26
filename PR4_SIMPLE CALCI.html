<!DOCTYPE html>
<html lang="en">
    <head>
        <script src=jquery-4.0.0.js></script>
    </head>
  <body>
    <label>Test1 </label>
    <input type="text"  name="TEST" id="test1" value="" placeholder="Please Enter First Number"><br>

    <label>OP </label>
    <input type="text"  name="OP" id="op1" value="" placeholder="Please Enter Operator"><br>

    <label>Test2 </label>
    <input type="text"  name="TEST1" id="test2" value="" placeholder="Please Enter Second Number"><br>

    <button onclick="funcalculate()">CALCULATE</button><br>


    <label>Result </label>
    <span id="result"></span><br>
   
  </body>
</html>
<script>


 function funcalculate()
 {
    debugger;
  var cal="";
  let test1=$("#test1").val();
  let test2=$("#test2").val();
  let op1=$("#op1").val();

  if(op1=="+")
 {
   cal = parseInt(test1)+parseInt(test2);
 }
   if(op1=="-")
 {
    cal = parseInt(test1)-parseInt(test2);
 }
 if(op1=="*")
 {
   cal = parseInt(test1)*parseInt(test2);
 }
  if(op1=="/")
 {
   cal = parseInt(test1)/parseInt(test2);
 }


  $("#result").html(cal);

 }
 </script>
