<!DOCTYPE html>
<html lang="en">
    <head>
        <title>JS EVENT</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width" initial scale="1.0">
     </head>
    <body>
        <button name="CLICK" onclick="clickevent()">Test</button>
        <input type="submit" name="submit" value="submit" onclick="clickevent()">
        <p id="one" onmouseover="overeffect()">WELCOME</p>
        <p id="one" tabindex="0" onblur="onblureffect()">WELCOME</p>
        <input type="text" name="fname" id="f_name" onkeyup="checkval(this)">
        <p id="test"></p>
    </body>
</html>
<script>
    function clickevent()
    {
        alert("Button Clicked");
    }

    function overeffect()
    {
        document.getElementById("one").style.color="green";
    }
     function onblureffect()
    {
        document.getElementById("one").style.color="red";
        document.getElementById("one").style.opacity=0.5;
    }
    function checkval(e
        
    )
    {
        document.getElementById("test").innerText=e.value;
        alert(e.value);
    }
</script>
