<!DOCTYPE html>
  <html>
    <head>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>

            *{
                 margin: 0;
                 padding: 0;
                 box-sizing: border-box;
            }
             #main{

                max-width:1200px;
                height: 800px;
                background-color: skyblue;
             }

             .header{
                width: 1200px;
                height: 150px;
                background-color: pink;
             }

             .logo{
                width: 100px;
                height: 100px;
                background-color: aliceblue;
                 margin:20px;
                padding:10px;
             
                float:left;
               }

             .nav{
                width: 300px;
                height: 100px;
                background-color: violet;
                 margin:20px;
                padding:10px; 
                float:right;
               
             }

             .banner{
                width:1200px;
                height:300px;
                background-color: brown;
             }

             .middle{
                width:1200px;
                height:600px;
                background-color: olive;

             }

             .img{
                width:300px;
                height: 300px;
                background-color: orange;
                margin: 20px;
                padding: 20px;
                float: left;
             }

             .Description{
                width:600px;
                height: 250px;
                background-color: red;
                margin:20px;
                padding: 20px;
                float:right;
             }

             .footer{
                  width:1200px;
                height: 100px;
                background-color: lightyellow;
              
             }

            </style>
    </head>

    <body>
        <div id="main">
            <div class="header">
                <div class="logo">Logo</div>
                <div class="nav">Navigation</div>
            </div>

            <div class="banner">Banner</div>
            
            <div class="middle">
                <div class="img">Img</div>
                <div class="Description">Description</div>
            </div>
            <div class="footer">Footer</div>
        </div>
    </body>
  </html>
