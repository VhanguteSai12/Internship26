<!DOCTYPE html>
<html lang="en">
<head>
    <title>MY FIRST LAYOUT</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width" initial-scale="1.0">
    <style>
    *
    {
        margin:0px;
        padding:0px;
        box-sizing: border-box;
    } 

    #one
    {
     background-color: pink;
     width:2000px;
     height:500px;

    }
    .m1
    {
        width:100px;
        height:100px;
        background-color: chartreuse;
        border: 2px solid red;
        margin-top:20px;
        margin-bottom:20px;
        margin-left:20px;
        margin-right:20px;

        padding:20px 20px 20px 20px;
        float:left;
    }
    .m2
    {
        width:300px;
        height:300px;
        background-color: rgb(184, 166, 167);
        border: 2px solid blue;
        margin-top:20px;
        margin-bottom:20px;
        margin-left:20px;
        margin-right:20px;

        padding:20px 20px 20px 20px;
        float:right;
    }
    .m3
    {
        width:2000px;
        height:200px;
        background-color: lightblue ;
        border: 2px dotted black;
        
    }

    .m3 .m4:hover
    {
        font-size:15px;
        font-weight: bold;
        text-transform: uppercase;
        color:blue;
    }
    #two
    {
        background-color: antiquewhite;
        width:2000px;
        height:300px;
    }
    
    #two .m5
    {
        background-color:rgb(233, 166, 228) ;
        width:1000px;
        height:200px;
        float:left;

    } 
    #two .m6
    {
        background-color:rgb(43, 119, 154) ;
        width:1000px;
        height:200px;
        float:right;

    } 
    .m7
    {
        background-color: burlywood;
        text-decoration: dashed;
        text-transform: uppercase;
        color:brown;
    }
   
    </style>
</head>
<body>
    <div id="one">
        <div class="m1">LOGO</div>
        <div class="m2">IMAGE</div>
    </div>
    

    <div class="m3">
        <div class="m4">Banner</div>
    
    </div>

    <div id="two">
        <div class="m5">Comments</div>
        <div class="m6">Suggestions</div>
        <div class="m7">footer</div>
        
    </div>

    
    
</body>
</html>
